<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#4f46e5"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>BM Vocab - Quiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; padding-bottom:80px; }
    html.dark body            { background:#0f172a !important; }
    html.dark .bg-white       { background:#1e293b !important; }
    html.dark .bg-gray-50     { background:#0f172a !important; }
    html.dark nav.bg-white    { background:#1e293b !important; }
    html.dark .bottom-nav     { background:#1e293b !important; border-top-color:#334155 !important; }
    html.dark .text-gray-800  { color:#f1f5f9 !important; }
    html.dark .text-gray-700  { color:#e2e8f0 !important; }
    html.dark .text-gray-500  { color:#94a3b8 !important; }
    html.dark .text-gray-400  { color:#64748b !important; }
    html.dark .text-gray-600  { color:#cbd5e1 !important; }
    html.dark .option-btn     { background:#1e293b !important; border-color:#334155 !important; color:#e2e8f0 !important; }
    html.dark .score-bar      { background:#1e3a5f !important; }
    html.dark input           { background:#0f172a !important; color:#f1f5f9 !important; border-color:#334155 !important; }
    html.dark .bg-indigo-50   { background:#1e1b4b !important; }
    html.dark .bg-green-50    { background:#052e16 !important; }
    html.dark .bg-red-50      { background:#450a0a !important; }
    html.dark .diff-primary   { background:#1e3a5f !important; border-color:#1d4ed8 !important; color:#93c5fd !important; }
    html.dark .diff-secondary { background:#052e16 !important; border-color:#166534 !important; color:#4ade80 !important; }
    html.dark .bg-gray-100    { background:#334155 !important; }
    html.dark .skeleton        { background:#334155 !important; }
    html.dark .offline-banner  { background:#1a1200 !important; border-color:#854d0e !important; color:#fcd34d !important; }

    .option-btn { transition:transform .12s,box-shadow .12s,background .15s; border:2.5px solid transparent; }
    .option-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 18px rgba(0,0,0,.1); }
    .option-correct { background:#dcfce7 !important; border-color:#16a34a !important; color:#15803d !important; }
    .option-wrong   { background:#fee2e2 !important; border-color:#dc2626 !important; color:#b91c1c !important; }
    .score-bar { height:8px; border-radius:99px; background:#e0e7ff; overflow:hidden; }
    .score-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#4f46e5,#818cf8); transition:width .4s ease; }
    .mode-tab { transition:background .2s,color .2s; }
    .mode-tab.active { background:#4f46e5; color:white; }
    html.dark .mode-tab { color:#94a3b8; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    .shake { animation:shake .4s; }
    @keyframes bounce-in { 0%{transform:scale(.95)} 60%{transform:scale(1.04)} 100%{transform:scale(1)} }
    .bounce-in { animation:bounce-in .3s; }
    @keyframes pop-in { 0%{transform:scale(.7);opacity:0} 80%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
    .pop-in { animation:pop-in .5s forwards; }
    .feedback-correct { background:#dcfce7; border-left:5px solid #16a34a; }
    .feedback-wrong   { background:#fee2e2; border-left:5px solid #dc2626; }
    html.dark .feedback-correct { background:#052e16 !important; }
    html.dark .feedback-wrong   { background:#450a0a !important; }
    #typeInput:focus { outline:none; border-color:#4f46e5 !important; box-shadow:0 0 0 3px #c7d2fe; }
    @keyframes xp-float { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.3)} }
    .xp-float { animation:xp-float .9s ease forwards; pointer-events:none; }
    .levelup-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; z-index:100; }
    @keyframes levelup-pop { 0%{transform:scale(.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    .levelup-card { animation:levelup-pop .5s forwards; }
    .diff-banner { border-radius:1rem; padding:10px 16px; font-size:12px; font-weight:800; text-align:center; margin-bottom:12px; }
    .diff-primary   { background:#dbeafe; color:#1e40af; border:1.5px solid #93c5fd; }
    .diff-secondary { background:#dcfce7; color:#166534; border:1.5px solid #86efac; }
    .offline-banner { background:#fef3c7; border:2px solid #fcd34d; }
    .skeleton { border-radius:1.5rem; background:#e5e7eb; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #f3f4f6; padding:8px 0 max(8px,env(safe-area-inset-bottom)); z-index:50; }
    .nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; flex:1; font-size:11px; font-weight:800; color:#9ca3af; text-decoration:none; transition:color .2s; }
    .nav-item.active { color:#4f46e5; }
    .nav-icon { font-size:22px; line-height:1; }
  </style>
  <script>(function(){const t=localStorage.getItem('bmvocab_theme');if(t==='dark')document.documentElement.classList.add('dark');})();</script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen">

  <!-- Level-up overlay -->
  <div id="levelUpOverlay" class="levelup-overlay hidden">
    <div class="levelup-card bg-white rounded-3xl shadow-2xl p-8 text-center mx-6">
      <div class="text-6xl mb-3">⬆️</div>
      <h2 class="text-2xl font-black text-indigo-700 mb-1">Level Up!</h2>
      <p class="text-gray-500 mb-4" id="levelUpMsg"></p>
      <button onclick="document.getElementById('levelUpOverlay').classList.add('hidden')"
        class="bg-indigo-500 text-white font-black py-3 px-8 rounded-2xl">Awesome! 🎉</button>
    </div>
  </div>

  <nav class="bg-white shadow-sm px-5 py-4 flex items-center justify-between sticky top-0 z-10">
    <a href="home.html" class="text-indigo-600 font-bold text-lg">← Back</a>
    <h1 class="font-extrabold text-indigo-700 text-lg">🎯 Quiz</h1>
    <button id="soundToggleBtn" onclick="handleSoundToggle()" class="text-xl" title="Toggle sound">🔊</button>
  </nav>

  <div class="max-w-md mx-auto px-4 py-5">
    <div id="offlineBanner" class="offline-banner hidden rounded-2xl px-4 py-2 mb-3 text-yellow-800 text-xs font-bold text-center">📶 Offline — showing cached words</div>
    <div id="diffBanner" class="hidden diff-banner"></div>

    <!-- Mode tabs -->
    <div class="flex bg-white rounded-2xl p-1 shadow-sm mb-4 gap-1">
      <button class="mode-tab active flex-1 py-2 rounded-xl font-bold text-sm" id="tabMCQ"   onclick="setMode('mcq')">📋 MCQ</button>
      <button class="mode-tab flex-1 py-2 rounded-xl font-bold text-sm text-gray-500" id="tabType"  onclick="setMode('type')">✏️ Type</button>
      <button class="mode-tab flex-1 py-2 rounded-xl font-bold text-sm text-gray-500" id="tabSpeed" onclick="setMode('speed')">⚡ Speed</button>
    </div>

    <!-- HUD -->
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <span class="text-indigo-600 font-bold text-sm">Score: <span id="scoreDisplay">0</span></span>
        <span class="text-xs bg-indigo-100 text-indigo-600 font-black px-2 py-0.5 rounded-full" id="xpDisplay">+0 XP</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-sm text-gray-400" id="qCounter">1 / 10</span>
        <span class="text-sm" id="livesDisplay">❤️❤️❤️</span>
      </div>
    </div>
    <div class="score-bar mb-4"><div class="score-fill" id="scoreFill" style="width:0%"></div></div>

    <!-- Loading skeleton -->
    <div id="loadingState" class="space-y-4">
      <div class="skeleton h-40 animate-pulse"></div>
      <div class="grid grid-cols-2 gap-3">
        <div class="skeleton h-16 animate-pulse"></div>
        <div class="skeleton h-16 animate-pulse"></div>
        <div class="skeleton h-16 animate-pulse"></div>
        <div class="skeleton h-16 animate-pulse"></div>
      </div>
    </div>

    <!-- Error -->
    <div id="errorState" class="hidden text-center py-16">
      <div class="text-5xl mb-3">⚠️</div>
      <p class="text-red-400 font-semibold mb-3">Failed to load words.</p>
      <a href="home.html" class="bg-gray-100 text-gray-600 font-bold py-2 px-5 rounded-full text-sm">← Back</a>
    </div>

    <div id="quizScreen" class="hidden">
      <!-- Question card -->
      <div class="bg-white rounded-3xl shadow-md p-6 mb-4 text-center">
        <p class="text-indigo-400 text-xs font-bold uppercase tracking-widest mb-3" id="questionDir">—</p>
        <p class="text-4xl font-black text-gray-800 mb-3" id="questionWord">—</p>
        <button id="audioBtn" onclick="speakQuestion()"
          class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 font-bold px-4 py-2 rounded-full text-sm transition-colors">
          🔊 Pronounce
        </button>
        <div id="timerBarWrapper" class="hidden mt-4">
          <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
            <div id="timerBar" class="h-full bg-indigo-400 rounded-full" style="width:100%"></div>
          </div>
        </div>
      </div>

      <div id="feedbackStrip" class="hidden rounded-xl px-4 py-3 mb-4 text-sm font-bold"></div>

      <!-- MCQ options -->
      <div id="mcqOptions" class="gap-3 mb-4"></div>

      <!-- Type answer -->
      <div id="typeSection" class="hidden mb-4">
        <input type="text" id="typeInput" placeholder="Type your answer..."
          class="w-full border-2 border-indigo-200 rounded-2xl px-5 py-4 text-lg font-bold text-gray-700 mb-3"
          autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button id="submitBtn" onclick="submitTyped()"
          class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-2xl shadow text-lg">
          Submit ➜
        </button>
      </div>

      <button id="nextBtn" onclick="nextQuestion()"
        class="hidden w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-md text-lg">
        Next Question →
      </button>
    </div>

    <!-- Results -->
    <div id="resultsScreen" class="hidden text-center">
      <div class="pop-in bg-white rounded-3xl shadow-lg p-8">
        <div id="resultEmoji" class="text-6xl mb-3">🏆</div>
        <h2 class="text-2xl font-black mb-1" id="resultTitle">Quiz Complete!</h2>
        <p class="text-gray-400 mb-2" id="resultSubtitle"></p>
        <div class="bg-indigo-50 rounded-2xl p-3 mb-5">
          <p class="text-indigo-700 font-black text-xl" id="resultXP">+0 XP</p>
          <p class="text-indigo-400 text-xs">earned this quiz</p>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-5">
          <div class="bg-green-50 rounded-2xl p-3"><p class="text-2xl font-black text-green-600" id="resCorrect">0</p><p class="text-xs text-gray-500">Correct</p></div>
          <div class="bg-red-50 rounded-2xl p-3"><p class="text-2xl font-black text-red-400" id="resWrong">0</p><p class="text-xs text-gray-500">Wrong</p></div>
          <div class="bg-indigo-50 rounded-2xl p-3"><p class="text-2xl font-black text-indigo-500" id="resScore">0%</p><p class="text-xs text-gray-500">Score</p></div>
        </div>
        <div id="missedSection" class="hidden text-left mb-5">
          <p class="font-bold text-gray-600 mb-2 text-sm">📖 Words to Review:</p>
          <div id="missedList" class="space-y-2 max-h-48 overflow-y-auto"></div>
        </div>
        <div class="flex flex-col gap-3">
          <button onclick="restartQuiz()" class="bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-2xl shadow">🔁 Try Again</button>
          <button onclick="shareScore()" class="bg-white border-2 border-indigo-200 text-indigo-600 font-bold py-3 rounded-2xl shadow flex items-center justify-center gap-2 hover:bg-indigo-50 transition-colors">
            📤 Share My Score
          </button>
          <a href="study.html" id="studyLink" class="block bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-2xl shadow text-center">📚 Back to Flashcards</a>
          <a href="home.html" class="block bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-2xl text-center">🏠 Home</a>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="max-w-2xl mx-auto flex">
      <a href="home.html"        class="nav-item"><span class="nav-icon">🏠</span>Home</a>
      <a href="progress.html"    class="nav-item"><span class="nav-icon">📊</span>Progress</a>
      <a href="leaderboard.html" class="nav-item"><span class="nav-icon">🏆</span>Ranking</a>
      <a href="profile.html"     class="nav-item"><span class="nav-icon">👤</span>Profile</a>
    </div>
  </nav>

  <script type="module">
    import { db, auth } from "./js/firebase.js";
    import { recordStudySession } from "./js/streak.js";
    import { syncMemberXP } from "./js/teacher.js";
    import { initTheme } from "./js/theme.js";
    import { isOnline, getCachedWords, cacheWords } from "./js/cache.js";
    import { playCorrect, playWrong, playLevelUp, playQuizComplete, isSoundEnabled, toggleSound } from "./js/sounds.js";
    import { onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { collection, query, where, getDocs, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    initTheme();

    // Sound toggle
    function syncSoundBtn() {
      const btn = document.getElementById("soundToggleBtn");
      if (btn) btn.textContent = isSoundEnabled() ? "🔊" : "🔇";
    }
    window.handleSoundToggle = function() { toggleSound(); syncSoundBtn(); };
    syncSoundBtn();

    const DIFFICULTY={
      primary:  {options:3,lives:5,speedSeconds:12,quizLength:8, xpPerCorrect:8, label:"🏫 Primary Mode — 3 options · 5 lives · 12s speed"},
      secondary:{options:4,lives:3,speedSeconds:8, quizLength:10,xpPerCorrect:10,label:"🎓 Secondary Mode — 4 options · 3 lives · 8s speed"},
      guest:    {options:4,lives:3,speedSeconds:8, quizLength:10,xpPerCorrect:10,label:""},
    };

    let allWords=[],quizWords=[],currentIndex=0,score=0,lives=3;
    let correct=0,wrong=0,missedWords=[],mode="mcq",answered=false;
    let speedTimer=null,currentUser=null,sessionXP=0,userClassId=null;
    let userLevel="guest",diff=DIFFICULTY.guest;

    const params=new URLSearchParams(window.location.search);
    const packId=params.get("pack")||"";
    document.getElementById("studyLink").href=`study.html?pack=${packId}`;

    onAuthStateChanged(auth, async (user) => {
      if (!user){window.location.href="index.html";return;}
      currentUser=user;
      if (!user.isAnonymous){
        try{ const s=await getDoc(doc(db,"users",user.uid)); if(s.exists()&&s.data().schoolLevel) userLevel=s.data().schoolLevel; if(s.exists()&&s.data().classId) userClassId=s.data().classId; }catch{}
      }
      diff=DIFFICULTY[userLevel]||DIFFICULTY.guest;
      applyDifficulty();
      await loadWords();
    });

    function applyDifficulty(){
      if (diff.label){
        const b=document.getElementById("diffBanner");
        b.textContent=diff.label; b.className=`diff-banner diff-${userLevel}`; b.classList.remove("hidden");
      }
      document.getElementById("mcqOptions").className=diff.options===3?"flex flex-col gap-3 mb-4":"grid grid-cols-2 gap-3 mb-4";
    }

    async function loadWords(){
      try {
        let fromCache=false;
        if (isOnline()){
          const q=query(collection(db,"words"),where("pack","==",packId));
          const snap=await getDocs(q);
          allWords=snap.docs.map(d=>({id:d.id,...d.data()}));
          cacheWords(packId,allWords);
        } else {
          allWords=getCachedWords(packId)||[];
          fromCache=true;
          if (!allWords.length){showError();return;}
        }
        if (fromCache) document.getElementById("offlineBanner").classList.remove("hidden");
        document.getElementById("loadingState").classList.add("hidden");
        document.getElementById("quizScreen").classList.remove("hidden");
        startQuiz();
      } catch {
        const cached=getCachedWords(packId);
        if (cached?.length){ allWords=cached; document.getElementById("offlineBanner").classList.remove("hidden"); document.getElementById("loadingState").classList.add("hidden"); document.getElementById("quizScreen").classList.remove("hidden"); startQuiz(); }
        else showError();
      }
    }

    function showError(){ document.getElementById("loadingState").classList.add("hidden"); document.getElementById("errorState").classList.remove("hidden"); }

    function startQuiz(){
      quizWords=shuffle([...allWords]).slice(0,diff.quizLength);
      currentIndex=0;score=0;lives=diff.lives;correct=0;wrong=0;missedWords=[];sessionXP=0;
      updateHUD(); showQuestion();
    }

    function showQuestion(){
      if (currentIndex>=quizWords.length||lives<=0){endQuiz();return;}
      answered=false; clearTimer();
      const word=quizWords[currentIndex];
      document.getElementById("feedbackStrip").classList.add("hidden");
      document.getElementById("nextBtn").classList.add("hidden");
      document.getElementById("qCounter").textContent=`${currentIndex+1} / ${Math.min(diff.quizLength,quizWords.length)}`;
      const bmToEn=userLevel==="primary"?false:Math.random()>0.4;
      word._bmToEn=bmToEn;
      document.getElementById("questionDir").textContent=bmToEn?"What is the English meaning of...":"What is the BM word for...";
      document.getElementById("questionWord").textContent=bmToEn?word.bm:word.en;
      document.getElementById("audioBtn").classList.toggle("hidden",!bmToEn);
      if (mode==="mcq"||mode==="speed"){
        buildMCQ(word,bmToEn);
        document.getElementById("mcqOptions").classList.remove("hidden");
        document.getElementById("typeSection").classList.add("hidden");
        if (mode==="speed") startSpeedTimer();
      } else {
        document.getElementById("mcqOptions").classList.add("hidden");
        document.getElementById("typeSection").classList.remove("hidden");
        const ti=document.getElementById("typeInput");
        ti.value=""; ti.disabled=false;
        ti.className="w-full border-2 border-indigo-200 rounded-2xl px-5 py-4 text-lg font-bold text-gray-700 mb-3";
        document.getElementById("submitBtn").classList.remove("hidden");
        document.getElementById("nextBtn").classList.add("hidden");
        ti.focus(); ti.onkeydown=e=>{if(e.key==="Enter")submitTyped();};
      }
    }

    function buildMCQ(word,bmToEn){
      const correctAns=bmToEn?word.en:word.bm;
      const distractors=shuffle(allWords.filter(w=>w.id!==word.id)).slice(0,diff.options-1).map(w=>bmToEn?w.en:w.bm);
      const options=shuffle([correctAns,...distractors]);
      const container=document.getElementById("mcqOptions");
      container.innerHTML="";
      options.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="option-btn bg-white border-gray-200 rounded-2xl p-4 font-bold text-gray-700 text-base shadow-sm w-full text-left";
        btn.textContent=opt;
        btn.onclick=()=>handleMCQ(opt,correctAns,btn);
        container.appendChild(btn);
      });
    }

    window.handleMCQ=function(chosen,correctAns,btn){
      if (answered)return; clearTimer(); answered=true;
      document.querySelectorAll(".option-btn").forEach(b=>{b.disabled=true; if(b.textContent===correctAns)b.classList.add("option-correct");});
      if (chosen===correctAns){
        btn.classList.add("bounce-in");
        const xp=mode==="speed"?Math.round(diff.xpPerCorrect*1.5):diff.xpPerCorrect;
        score+=xp; sessionXP+=xp; correct++;
        playCorrect();
        showFeedback(true,correctAns); floatXP(`+${xp} XP`);
      } else {
        btn.classList.add("option-wrong","shake"); lives--; wrong++; missedWords.push(quizWords[currentIndex]);
        playWrong();
        showFeedback(false,correctAns);
      }
      updateHUD(); document.getElementById("nextBtn").classList.remove("hidden");
    };

    // Multi-word answer: "draw / tie" → accept "draw" or "tie"
    function extractParts(ans){ return ans.toLowerCase().split(/[\/,;|]/).map(s=>s.trim()).filter(s=>s.length>0); }
    function multiWordMatch(typed,correctAns){ return extractParts(correctAns).some(p=>fuzzyMatch(typed.toLowerCase().trim(),p)); }

    window.submitTyped=function(){
      if (answered)return;
      const input=document.getElementById("typeInput");
      const typed=input.value.trim();
      const word=quizWords[currentIndex];
      const correctAns=word._bmToEn?word.en:word.bm;
      answered=true; input.disabled=true;
      // Hide submit, show next
      document.getElementById("submitBtn").classList.add("hidden");
      document.getElementById("nextBtn").classList.remove("hidden");
      if (multiWordMatch(typed,correctAns)){
        score+=diff.xpPerCorrect; sessionXP+=diff.xpPerCorrect; correct++;
        input.className="w-full border-2 border-green-400 bg-green-50 rounded-2xl px-5 py-4 text-lg font-bold text-gray-700 mb-3";
        playCorrect();
        showFeedback(true,correctAns); floatXP(`+${diff.xpPerCorrect} XP`);
      } else {
        lives--; wrong++; missedWords.push(word);
        input.className="w-full border-2 border-red-400 bg-red-50 rounded-2xl px-5 py-4 text-lg font-bold text-gray-700 mb-3";
        playWrong();
        showFeedback(false,correctAns);
      }
      updateHUD();
    };

    window.speakQuestion=function(){ const w=quizWords[currentIndex]; if(!w)return; const u=new SpeechSynthesisUtterance(w.bm); u.lang="ms-MY"; u.rate=0.85; speechSynthesis.speak(u); };

    function showFeedback(isCorrect,correctAns){
      const s=document.getElementById("feedbackStrip");
      const parts=extractParts(correctAns);
      const hint=parts.length>1?` (accepted: ${parts.join(" or ")})`:"";
      s.className=`rounded-xl px-4 py-3 mb-4 text-sm font-bold ${isCorrect?"feedback-correct":"feedback-wrong"}`;
      s.textContent=isCorrect?`✅ Correct! "${correctAns}"${hint}`:`❌ Wrong! The answer is "${correctAns}"${hint}`;
      s.classList.remove("hidden");
    }

    function floatXP(text){
      const el=document.createElement("div");
      el.textContent=text; el.className="xp-float fixed font-black text-indigo-600 text-lg z-50";
      el.style.cssText="top:120px;left:50%;transform:translateX(-50%)";
      document.body.appendChild(el); setTimeout(()=>el.remove(),950);
      document.getElementById("xpDisplay").textContent=`+${sessionXP} XP`;
    }

    window.nextQuestion=function(){ currentIndex++; showQuestion(); };

    async function endQuiz(){
      document.getElementById("quizScreen").classList.add("hidden");
      document.getElementById("resultsScreen").classList.remove("hidden");
      const total=correct+wrong, pct=total?Math.round((correct/total)*100):0;
      document.getElementById("resCorrect").textContent=correct;
      document.getElementById("resWrong").textContent=wrong;
      document.getElementById("resScore").textContent=pct+"%";
      document.getElementById("resultXP").textContent=`+${sessionXP} XP`;
      const [emoji,title,sub]=pct>=90?["🏆","Excellent!","You're a BM vocab champion!"]:pct>=70?["🎉","Great job!","Keep it up!"]:pct>=50?["👍","Not bad!","A bit more practice will help."]:["💪","Keep trying!","Review the flashcards and try again."];
      document.getElementById("resultEmoji").textContent=emoji;
      document.getElementById("resultTitle").textContent=title;
      document.getElementById("resultSubtitle").textContent=sub;
      if (missedWords.length>0){
        document.getElementById("missedSection").classList.remove("hidden");
        document.getElementById("missedList").innerHTML=missedWords.map(w=>`<div class="flex justify-between bg-red-50 rounded-xl px-4 py-2 text-sm"><span class="font-bold text-red-700">${w.bm}</span><span class="text-gray-500">${w.en}</span></div>`).join("");
      }
      // Play quiz complete sound
      playQuizComplete();

      if (currentUser&&!currentUser.isAnonymous&&sessionXP>0){
        try {
          const result=await recordStudySession(currentUser.uid,sessionXP);
          if (result.leveledUp){
            document.getElementById("levelUpMsg").textContent=`You're now "${result.newLevel.title}"!`;
            document.getElementById("levelUpOverlay").classList.remove("hidden");
            setTimeout(()=>playLevelUp(), 300);
          }
          // Sync updated XP to class member doc
          if (userClassId) await syncMemberXP(userClassId, result.newXP);
        } catch(e){console.warn(e);}
      }
    }

    // ── Share score via Web Share API ────────────────────────────
    window.shareScore = async function() {
      const pct   = document.getElementById("resScore").textContent;
      const xp    = document.getElementById("resultXP").textContent;
      const title = document.getElementById("resultTitle").textContent;
      const pack  = packId ? packId.charAt(0).toUpperCase()+packId.slice(1).replace(/_/g," ") : "BM Vocab";

      const text = `${title} I scored ${pct} on the "${pack}" quiz in BM Vocab!\n${xp} earned 🇲🇾\n\nLearn Bahasa Malaysia vocabulary at bm-vocab-app.web.app`;

      if (navigator.share) {
        try {
          await navigator.share({ title:"BM Vocab Quiz Result", text });
        } catch(e) {
          if (e.name !== "AbortError") fallbackShare(text);
        }
      } else {
        fallbackShare(text);
      }
    };

    function fallbackShare(text) {
      navigator.clipboard.writeText(text)
        .then(()=>{ alert("✅ Score copied to clipboard! Paste it anywhere to share."); })
        .catch(()=>{ alert(text); });
    }

    window.restartQuiz=function(){
      document.getElementById("resultsScreen").classList.add("hidden");
      document.getElementById("quizScreen").classList.remove("hidden");
      document.getElementById("missedSection").classList.add("hidden");
      startQuiz();
    };

    window.setMode=function(m){
      mode=m;
      ["MCQ","Type","Speed"].forEach(id=>document.getElementById("tab"+id).classList.remove("active"));
      const map={mcq:"MCQ",type:"Type",speed:"Speed"};
      document.getElementById("tab"+map[m]).classList.add("active");
      document.getElementById("timerBarWrapper").classList.toggle("hidden",m!=="speed");
      startQuiz();
    };

    function startSpeedTimer(){
      const bar=document.getElementById("timerBar");
      document.getElementById("timerBarWrapper").classList.remove("hidden");
      bar.style.transition="none"; bar.style.width="100%";
      let elapsed=0;
      speedTimer=setInterval(()=>{
        elapsed+=100;
        const pct=Math.max(0,100-(elapsed/(diff.speedSeconds*1000))*100);
        bar.style.transition="width 100ms linear"; bar.style.width=pct+"%";
        bar.style.background=pct>50?"#4f46e5":pct>25?"#f59e0b":"#ef4444";
        if (elapsed>=diff.speedSeconds*1000){
          clearTimer();
          if (!answered){ answered=true; const w=quizWords[currentIndex]; showFeedback(false,w._bmToEn?w.en:w.bm); lives--; wrong++; missedWords.push(w); document.querySelectorAll(".option-btn").forEach(b=>b.disabled=true); updateHUD(); document.getElementById("nextBtn").classList.remove("hidden"); }
        }
      },100);
    }

    function clearTimer(){ if(speedTimer){clearInterval(speedTimer);speedTimer=null;} }

    function updateHUD(){
      document.getElementById("scoreDisplay").textContent=score;
      document.getElementById("livesDisplay").textContent="❤️".repeat(Math.max(0,lives))+"🖤".repeat(Math.max(0,diff.lives-lives));
      const pct=quizWords.length?(currentIndex/quizWords.length)*100:0;
      document.getElementById("scoreFill").style.width=pct+"%";
    }

    function fuzzyMatch(a,b){ return a===b||levenshtein(a,b)<=1; }
    function levenshtein(a,b){ const m=a.length,n=b.length,dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0)); for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]); return dp[m][n]; }
    function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
  </script>
