<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#16a34a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>BM Vocab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Nunito',sans-serif; }
    /* Dark mode */
    html.dark body { background:#0f172a !important; }
    html.dark .card { background:#1e293b !important; }
    html.dark h1,html.dark h2 { color:#f1f5f9 !important; }
    html.dark p  { color:#94a3b8 !important; }
    html.dark input { background:#0f172a !important; color:#f1f5f9 !important; border-color:#334155 !important; }
    html.dark .feature-chip { background:#1e293b !important; border-color:#334155 !important; color:#cbd5e1 !important; }
    html.dark .btn-google { background:#1e293b !important; border-color:#334155 !important; color:#e2e8f0 !important; }
    html.dark .btn-guest  { background:#1e293b !important; border-color:#334155 !important; color:#94a3b8 !important; }

    .bg-pattern {
      background-color:#f0fdf4;
      background-image:
        radial-gradient(circle at 20% 20%,#bbf7d0 0%,transparent 50%),
        radial-gradient(circle at 80% 80%,#bfdbfe 0%,transparent 50%),
        radial-gradient(circle at 60% 20%,#fde68a 0%,transparent 40%);
    }
    html.dark .bg-pattern { background-color:#0f172a; background-image:none; }
    .card { background:white; border-radius:1.5rem; box-shadow:0 20px 60px rgba(0,0,0,.12); padding:2rem; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .float { animation:float 3s ease-in-out infinite; }
    @keyframes fade-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-up   { animation:fade-up .6s ease both; }
    .fade-up-2 { animation:fade-up .6s .15s ease both; }
    .fade-up-3 { animation:fade-up .6s .3s ease both; }
    .btn-google { background:white; border:2px solid #e5e7eb; transition:transform .15s,box-shadow .15s; }
    .btn-google:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.12); border-color:#16a34a; }
    .btn-guest  { background:white; border:2px dashed #d1d5db; transition:transform .15s,box-shadow .15s; }
    .btn-guest:hover  { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.08); border-color:#9ca3af; }
    .feature-chip { background:white; border:1.5px solid #e5e7eb; border-radius:99px; padding:6px 14px; font-size:13px; font-weight:700; color:#374151; display:inline-flex; align-items:center; gap:6px; }
    input:focus { outline:none; border-color:#16a34a !important; box-shadow:0 0 0 3px #bbf7d0; }
  </style>
  <script>
    // Init theme before render to prevent flash
    (function(){
      const t = localStorage.getItem('bmvocab_theme');
      if (t === 'dark') document.documentElement.classList.add('dark');
    })();
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () =>
        navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW:', e))
      );
    }
  </script>
</head>
<body class="bg-pattern min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">
  <div class="text-center mb-8 fade-up">
    <div class="float inline-block text-7xl mb-4">🇲🇾</div>
    <h1 class="text-4xl font-black text-green-700">BM Vocab</h1>
    <p class="text-gray-500 font-semibold mt-1">Belajar Bahasa Malaysia dengan seronok!</p>
  </div>

  <div class="flex flex-wrap justify-center gap-2 mb-8 fade-up-2">
    <span class="feature-chip">📚 16 Packs</span>
    <span class="feature-chip">🎯 Quizzes</span>
    <span class="feature-chip">⚡ Speed Mode</span>
    <span class="feature-chip">🔥 Streaks</span>
  </div>

  <div class="card fade-up-3">
    <h2 class="text-xl font-black text-gray-800 mb-1 text-center">Get Started</h2>
    <p class="text-gray-400 text-sm text-center mb-5">Sign in or explore as a guest</p>

    <button id="googleLoginBtn"
      class="btn-google w-full flex items-center justify-center gap-3 py-3 px-5 rounded-2xl font-bold text-gray-700 mb-3">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"/>
      Continue with Google
    </button>
    <button id="guestBtn"
      class="btn-guest w-full flex items-center justify-center gap-3 py-3 px-5 rounded-2xl font-bold text-gray-500 mb-4">
      <span class="text-xl">👤</span> Try as Guest
    </button>

    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-px bg-gray-100"></div>
      <span class="text-xs text-gray-400 font-semibold">or email</span>
      <div class="flex-1 h-px bg-gray-100"></div>
    </div>

    <input type="email"    id="emailInput"    placeholder="Email address" class="w-full border-2 border-gray-200 rounded-2xl px-4 py-3 text-sm font-semibold text-gray-700 mb-3" autocomplete="email"/>
    <input type="password" id="passwordInput" placeholder="Password"      class="w-full border-2 border-gray-200 rounded-2xl px-4 py-3 text-sm font-semibold text-gray-700 mb-3" autocomplete="current-password"/>
    <button id="emailLoginBtn"    class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-2xl mb-2 transition-colors">Log In</button>
    <button id="emailRegisterBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-2xl transition-colors">Create Account</button>

    <p class="text-xs text-gray-400 text-center mt-4 leading-relaxed">
      👤 Guest mode: explore freely — progress is <strong>not saved</strong>.
    </p>
    <p id="statusMsg" class="text-sm text-center mt-3 font-semibold hidden"></p>
  </div>

  <p class="text-center text-xs text-gray-400 mt-5">For primary &amp; secondary school students 🎓</p>
</div>

<script type="module">
  import { auth } from "./js/firebase.js";
  import {
    GoogleAuthProvider, signInWithPopup,
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    signInAnonymously, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // If ?signout=1, we were redirected from a guest page — stay on login
  const params = new URLSearchParams(window.location.search);
  if (params.get('signout') !== '1') {
    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      if (user.isAnonymous) { window.location.href="home.html"; return; }
      try {
        const db   = getFirestore();
        const snap = await getDoc(doc(db,"users",user.uid));
        window.location.href = (snap.exists() && snap.data().onboardingDone)
          ? "home.html" : "onboarding.html";
      } catch { window.location.href="home.html"; }
    });
  }

  function showStatus(msg, isError=false) {
    const el=document.getElementById("statusMsg");
    el.textContent=msg;
    el.className=`text-sm text-center mt-3 font-semibold ${isError?"text-red-500":"text-green-600"}`;
    el.classList.remove("hidden");
  }

  document.getElementById("googleLoginBtn").onclick = async () => {
    try { await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch { showStatus("Google sign-in failed. Try again.", true); }
  };
  document.getElementById("guestBtn").onclick = async () => {
    try { showStatus("Entering as guest..."); await signInAnonymously(auth); }
    catch { showStatus("Guest sign-in failed.", true); }
  };
  document.getElementById("emailLoginBtn").onclick = async () => {
    const e=document.getElementById("emailInput").value.trim();
    const p=document.getElementById("passwordInput").value;
    if (!e||!p) { showStatus("Please fill in email and password.",true); return; }
    try { await signInWithEmailAndPassword(auth,e,p); }
    catch { showStatus("Login failed. Check your email or password.",true); }
  };
  document.getElementById("emailRegisterBtn").onclick = async () => {
    const e=document.getElementById("emailInput").value.trim();
    const p=document.getElementById("passwordInput").value;
    if (!e||!p) { showStatus("Please fill in email and password.",true); return; }
    if (p.length<6) { showStatus("Password must be 6+ characters.",true); return; }
    try { await createUserWithEmailAndPassword(auth,e,p); }
    catch(err) {
      showStatus(err.code==="auth/email-already-in-use"
        ?"Email already registered. Please log in.":"Registration failed.",true);
    }
  };
  document.getElementById("passwordInput").addEventListener("keydown", e => {
    if (e.key==="Enter") document.getElementById("emailLoginBtn").click();
  });
</script>
</body>
</html>
